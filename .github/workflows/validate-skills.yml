name: Validate skills

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install official Agent Skills validator
        run: >-
          python -m pip install
          "skills-ref @ git+https://github.com/agentskills/agentskills.git@38a2ff82958afee88dadf4831509e6f7e9d8ef4e#subdirectory=skills-ref"

      - name: Validate repository skills
        run: python scripts/validate_skills.py --require-skills-ref
